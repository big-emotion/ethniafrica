name: Lighthouse CI — Mobile Performance

on:
  pull_request:
    branches: [recette, main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse Mobile Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Skip cleanly on forks / Dependabot PRs that cannot access the Supabase
      # secrets. When the secret is set (i.e. on PRs from the same repo) the
      # gate is enforced — no continue-on-error masks failures.
      - name: Check required secrets are present
        id: secrets
        run: |
          if [ -n "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Lighthouse — NEXT_PUBLIC_SUPABASE_URL secret not available (fork or Dependabot PR)."
          fi

      - name: Build Next.js app
        if: steps.secrets.outputs.present == 'true'
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Start Next.js server
        if: steps.secrets.outputs.present == 'true'
        run: npm run start &
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Wait for server to be ready
        if: steps.secrets.outputs.present == 'true'
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Install @lhci/cli
        if: steps.secrets.outputs.present == 'true'
        run: npm install -g @lhci/cli --legacy-peer-deps

      # Advisory while perf/a11y/BP work is still in flight (issue tracked
      # separately). The report is still posted on the PR; we just don't gate
      # merges on it yet. Flip back to enforced (drop continue-on-error) once
      # the routes meet thresholds.
      - name: Run Lighthouse CI
        id: lhci
        if: steps.secrets.outputs.present == 'true'
        run: lhci autorun
        continue-on-error: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Comment Lighthouse report on PR
        if: always() && github.event_name == 'pull_request' && steps.secrets.outputs.present == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');

            let publicLinks = '';
            try {
              const linksPath = '.lighthouseci/links.json';
              if (fs.existsSync(linksPath)) {
                const links = JSON.parse(fs.readFileSync(linksPath, 'utf8'));
                const entries = Object.entries(links)
                  .map(([url, reportUrl]) => `- [${url}](${reportUrl})`)
                  .join('\n');
                publicLinks = entries
                  ? '\n\n**Public report URLs:**\n' + entries
                  : '';
              }
            } catch (e) {
              console.log('Could not read links.json:', e.message);
            }

            const outcome = '${{ steps.lhci.outcome }}';
            const status = outcome === 'success' ? '✅ Passed' : '❌ Failed';
            const body = [
              '## Lighthouse CI — Mobile Performance ' + status,
              '',
              '**Thresholds:** Performance ≥ 85 | Accessibility = 100 | Best Practices ≥ 95',
              '',
              '**Routes audited:**',
              '- `/`',
              '- `/fr/pays/senegal`',
              '- `/fr/peuples/wolof`',
              publicLinks,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
