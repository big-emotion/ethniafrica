name: Lighthouse CI — Mobile Performance

on:
  pull_request:
    branches: [recette, main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse Mobile Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Advisory mode until repo secrets NEXT_PUBLIC_SUPABASE_URL,
      # NEXT_PUBLIC_SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY are configured.
      # Remove `continue-on-error: true` from the build/start/run steps below
      # to enforce UX-DR35 thresholds once secrets are in place.
      - name: Build Next.js app
        continue-on-error: true
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Start Next.js server
        continue-on-error: true
        run: npm run start &
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Wait for server to be ready
        continue-on-error: true
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Install @lhci/cli
        continue-on-error: true
        run: npm install -g @lhci/cli --legacy-peer-deps

      - name: Run Lighthouse CI
        id: lhci
        continue-on-error: true
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Comment Lighthouse report on PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let publicLinks = '';
            try {
              const linksPath = '.lighthouseci/links.json';
              if (fs.existsSync(linksPath)) {
                const links = JSON.parse(fs.readFileSync(linksPath, 'utf8'));
                const entries = Object.entries(links)
                  .map(([url, reportUrl]) => `- [${url}](${reportUrl})`)
                  .join('\n');
                publicLinks = entries
                  ? '\n\n**Public report URLs:**\n' + entries
                  : '';
              }
            } catch (e) {
              console.log('Could not read links.json:', e.message);
            }

            const outcome = '${{ steps.lhci.outcome }}';
            const status = outcome === 'success' ? '✅ Passed' : '❌ Failed';
            const body = [
              '## Lighthouse CI — Mobile Performance ' + status,
              '',
              '**Thresholds:** Performance ≥ 85 | Accessibility = 100 | Best Practices ≥ 95',
              '',
              '**Routes audited:**',
              '- `/`',
              '- `/fr/pays/senegal`',
              '- `/fr/peuples/wolof`',
              publicLinks,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
