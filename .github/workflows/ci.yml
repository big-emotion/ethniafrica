name: CI

on:
  # Pre-merge gate. Every change reaches recette/main via a PR, so pull_request
  # is the only event needed: it covers feature → recette and recette → main
  # alike, runs exactly once per commit SHA, and avoids the (push)/(pull_request)
  # duplication that doubles every check on a PR. Post-merge validation belongs
  # to the deploy workflows, not this gate.
  pull_request:
    branches: [recette, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    # Secret scan as its own job: no toolchain install needed, so it reports in
    # seconds and a leaked secret fails the PR even when the build is broken.
    # Separate from the Ferry automation, which runs its own gitleaks internally.
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      # Scan contract: this is a per-PR gate, so it scans the working tree at
      # the PR's HEAD (--no-git), not the full commit history. Secrets in
      # historical (already-removed) commits are a one-time audit + rotation
      # concern, not a recurring per-PR signal; --no-git keeps the gate
      # deterministic and fast. Image pinned by digest for supply-chain
      # integrity (zricethezav/gitleaks:v8.21.2).
      - name: Run gitleaks
        run: >
          docker run --rm -v "${{ github.workspace }}:/repo" -w /repo
          zricethezav/gitleaks@sha256:0e99e8821643ea5b235718642b93bb32486af9c8162c8b8731f7cbdc951a7f46
          detect --source . --no-git --config .gitleaks.toml --redact --no-banner

  build:
    # The universal required gate: lint, typecheck, format, test, build on
    # every PR. Heavy gates (e2e, Lighthouse, a11y, data-integrity) stay in
    # their own workflows — they are optional extensions, not part of this job.
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "npm"

      - run: npm ci

      # Restore the ESLint + Prettier caches so `npm run lint` and
      # `npm run format:check` only re-check files whose *content* changed since
      # a prior run. Both scripts must use `--cache-strategy content` (not the
      # default `metadata`): CI does fresh checkouts, so every file gets a new
      # mtime and `metadata` would never hit. Keyed on the lockfile + both
      # linter configs because ESLint's / Prettier's own caches invalidate on
      # file-content changes but NOT on a plugin/version or rule-config bump;
      # the `github.sha` suffix makes every run save a fresh (non-stale) entry
      # and the restore-keys prefix falls back to the most recent cache for the
      # same config.
      - name: Restore linter caches
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.cache/eslint
            node_modules/.cache/prettier
          key: linters-${{ hashFiles('package-lock.json', 'eslint.config.mjs', '.prettierrc.json', '.prettierignore') }}-${{ github.sha }}
          restore-keys: |
            linters-${{ hashFiles('package-lock.json', 'eslint.config.mjs', '.prettierrc.json', '.prettierignore') }}-

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run format:check

      - run: npm test

      # .next/cache is content-hashed by Next, so a stale entry is ignored,
      # never mis-served — restoring it only ever saves compile work.
      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nextjs-${{ hashFiles('package-lock.json') }}-

      # The Supabase modules validate their configuration at module scope and
      # throw when it is missing, which fails Next's page-data collection. The
      # build only needs values that parse — it never queries Supabase — so the
      # placeholders keep this gate running on Dependabot and fork PRs, where
      # secrets are not exposed. Falling back rather than skipping the job is
      # deliberate: a skipped job reports a neutral check, which branch
      # protection and Ferry's merger would read as success.
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-role-key' }}
