name: Data Integrity Gate

on:
  pull_request:
    branches: [main, recette]
  push:
    branches: [main, recette]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Enforced FR32 gate. Failures block the PR / push.
      - name: Run data-integrity validation (PR/push)
        if: github.event_name != 'schedule'
        run: npx tsx scripts/validateAfrikData.ts
        env:
          CHECK_SOURCE_URLS: "false"

      - name: Run data-integrity validation (nightly — includes URL checks)
        if: github.event_name == 'schedule'
        run: npx tsx scripts/validateAfrikData.ts
        env:
          CHECK_SOURCE_URLS: "true"

      - name: Upload source-url-health log (nightly only)
        if: github.event_name == 'schedule' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: source-url-health-log
          path: dataset/source-url-health.log
          if-no-files-found: ignore
