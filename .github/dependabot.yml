# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Keep SHA-pinned GitHub Actions up to date. Dependabot rewrites the SHA
  # and updates the trailing version comment on each release.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions

  # npm dependencies — grouped to keep PR volume manageable.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - npm
    groups:
      production-minor-and-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
      # Majors get their own PR so we can review the changelog carefully.
      production-major:
        dependency-type: production
        update-types:
          - major
      development-major:
        dependency-type: development
        update-types:
          - major
